appId: com.cate.app
productName: Cate
directories:
  output: release
# The cate-runtime daemon is NOT bundled in the app. One self-contained
# tarball per target is built in CI and uploaded to the GitHub release
# `v<version>`; on connect the remote pulls its own tarball (with a client-side
# fallback). See runtimeArtifacts.ts + .github/workflows/release.yml.
#
# @earendil-works/pi-coding-agent (the agent runtime, ~271MB) is NO LONGER
# bundled — it's a devDependency, shipped on demand as the cate-pi tarball and
# run by the runtime (local or remote). See build-pi-tarball.mjs + ensurePi.ts.
# @earendil-works/pi-ai stays a production dependency (authManager uses /oauth
# for cate's own login flow) and is unpacked here. The @earendil-works glob now
# only matches pi-ai + pi-agent-core. Its pure-JS SDK closure (AWS/Google/Mistral/
# OpenAI, zod, yaml, protobufjs, etc.) is NOT unpacked: it loads fine from inside
# app.asar. Unpacking the whole tree pushed codesign toward EMFILE on macOS
# (issue #150) and left ~11k loose sealed files in the bundle, so asarUnpack is
# kept to the native/WASM floor below.
asarUnpack:
  - "node_modules/@earendil-works/**"
  - "node_modules/.bin/pi"
  - "node_modules/.bin/pi.cmd"
  # Native + WASM modules only: these can't be dlopen'd / instantiated from inside
  # app.asar. The pure-JS deps that used to be listed here (the AWS/Google/Mistral/
  # OpenAI SDK closure, zod, yaml, protobufjs, etc.) load fine straight out of the
  # asar, so packing them keeps ~10k loose sealed files out of the bundle.
  - "node_modules/node-pty/**"
  # @parcel/watcher (workspace-tree file watching, main process) + its per-platform
  # prebuilt binary packages (@parcel/watcher-<platform>-<arch>[-glibc/musl], each
  # shipping watcher.node). The .node binaries can't be dlopen'd from inside
  # app.asar, so the whole family is unpacked. npm install on the build runner
  # provides the host platform's package.
  - "node_modules/@parcel/watcher/**"
  - "node_modules/@parcel/watcher-*/**"
  - "node_modules/koffi/**"
  - "node_modules/fsevents/**"
  - "node_modules/ssh2/**"
  - "node_modules/cpu-features/**"
  - "node_modules/iconv-corefoundation/**"
  - "node_modules/@mariozechner/clipboard/**"
  - "node_modules/@mariozechner/clipboard-darwin-arm64/**"
  - "node_modules/@mariozechner/clipboard-darwin-universal/**"
  - "node_modules/@silvia-odwyer/photon-node/**"
  - "node_modules/@napi-rs/**"
  - "node_modules/@img/**"
  - "node_modules/sharp/**"
  - "node_modules/pdfjs-dist/**"
extraResources:
  # Ship bundled pi extensions (e.g. cate-plan-mode) into the packaged app so
  # installPlanModeExtension can copy them into ~/.pi/agent/extensions/ on
  # first use. The src/ tree itself isn't packaged, so we mirror the files
  # under resources/cate-extensions/.
  - from: src/agent/extensions
    to: cate-extensions
    filter:
      - "**/*"
  # Ship the cate-theme authoring skill so installThemeSkill can copy it into
  # ~/.claude/skills/cate-theme/ on first launch.
  - from: skills
    to: skills
    filter:
      - "**/*"
  # Ship the runtime daemon tarball(s) so the packaged LOCAL workspace runs the
  # same daemon as remote hosts. Linux/Windows stage one host-arch
  # runtime-host.tgz; macOS stages BOTH runtime-host-x64.tgz (Intel) and
  # runtime-host-arm64.tgz, because one .app can run on either CPU and the
  # daemon's bundled node + node-pty are arch-specific (an arm64 daemon can't
  # exec on Intel → terminal never opens). Resolved at runtime by
  # shippedRuntimeTarball() → resources/runtime-host-<arch>.tgz (legacy
  # resources/runtime-host.tgz fallback). The glob copies whatever this runner
  # staged without erroring on the arches it didn't build (see release.yml).
  - from: dist-runtime
    to: .
    filter:
      - runtime-host*.tgz
publish:
  provider: github
  owner: 0-AI-UG
  repo: cate
  releaseType: release
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  extendInfo:
    NSMicrophoneUsageDescription: Cate needs microphone access so terminal-based tools (like Claude Code) can record audio for voice input.
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
win:
  icon: build/icon.ico
  # Code signing is driven by CI env vars (CSC_LINK / CSC_KEY_PASSWORD), wired
  # from the WINDOWS_CERTS / WINDOWS_CERTS_PASSWORD repo secrets in
  # .github/workflows/release.yml. With them set, electron-builder signs the
  # nsis installer + the app exe (no SmartScreen "unknown publisher" warning)
  # and uses an RFC-3161 timestamp so the signature outlives the cert. Without
  # them the build is simply unsigned — nothing here forces signing.
  signtoolOptions:
    rfc3161TimeStampServer: http://timestamp.digicert.com
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
linux:
  icon: build/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
