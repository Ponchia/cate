extraResources:
  # Ship bundled pi extensions (e.g. cate-plan-mode) into the packaged app so
  # installPlanModeExtension can copy them into ~/.pi/agent/extensions/ on
  # first use. The src/ tree itself isn't packaged, so we mirror the files
  # under resources/cate-extensions/.
  - from: src/agent/extensions
    to: cate-extensions
    filter:
      - "**/*"
  # Ship the cate-theme authoring skill so installThemeSkill can copy it into
  # ~/.claude/skills/cate-theme/ on first launch.
  - from: skills
    to: skills
    filter:
      - "**/*"
  # Ship the host-target companion tarball under a fixed name so the packaged
  # LOCAL workspace can run the same daemon tarball as remote hosts (resolved at
  # runtime via shippedCompanionTarball() → resources/companion-host.tgz).
  # scripts/package.mjs always produces this file before electron-builder runs
  # (copying cate-companion-<version>-<target>.tgz → companion-host.tgz).
  - from: dist-companion/companion-host.tgz
    to: companion-host.tgz
publish:
  provider: github
  owner: 0-AI-UG
  repo: cate
  releaseType: release
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  extendInfo:
    NSMicrophoneUsageDescription: Cate needs microphone access so terminal-based tools (like Claude Code) can record audio for voice input.
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
win:
  icon: build/icon.ico
  # Code signing is driven by CI env vars (CSC_LINK / CSC_KEY_PASSWORD), wired
  # from the WINDOWS_CERTS / WINDOWS_CERTS_PASSWORD repo secrets in
  # .github/workflows/release.yml. With them set, electron-builder signs the
  # nsis installer + the app exe (no SmartScreen "unknown publisher" warning)
  # and uses an RFC-3161 timestamp so the signature outlives the cert. Without
  # them the build is simply unsigned — nothing here forces signing.
  signtoolOptions:
    rfc3161TimeStampServer: http://timestamp.digicert.com
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
linux:
  icon: build/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
